{# templates/dashboard/components/widgets/chart_widget/chart_widget.html #}
{% load i18n %}

<!-- Chart Widget -->
<div class="flex flex-col bg-white border border-gray-200 shadow-2xs rounded-xl dark:bg-neutral-900 dark:border-neutral-800 {{ wrapper_classes }}">
    <div class="px-4 py-3 md:px-5 md:py-3">
        <h3 class="text-base font-bold text-gray-800 dark:text-white mb-3">
            {{ title }}
        </h3>

        <!-- Loader -->
        <div class="loader-container relative w-full {{ height }} flex items-center justify-center {% if not loading %}hidden{% endif %}">
            <div class="loader-element animate-spin inline-block w-6 h-6 border-[3px] border-current border-t-transparent text-gray-800 rounded-full dark:text-white"
                 role="status"
                 aria-label="{% translate 'Loading...' %}">
                <span class="sr-only">{% translate "Loading..." %}</span>
            </div>
        </div>

        <!-- Canvas (always rendered, hidden via CSS when loading) -->
        <div class="chart-container relative w-full {{ height }} {% if loading %}hidden{% endif %}" style="min-height: 0; min-width: 0;">
            <canvas id="{{ chart_id }}" data-chart-type="{{ chart_type }}" style="display: block; width: 100% !important; height: 100% !important;"></canvas>
        </div>

        <!-- Empty State (hidden by default, shown via JS if no data) -->
        <div id="{{ chart_id }}EmptyState" class="hidden">
            <div class="flex flex-col items-center justify-center {{ height }} text-center">
                <i class="fa-solid fa-chart-simple text-3xl text-gray-300 dark:text-gray-600 mb-2"></i>
                <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">{{ empty_message }}</p>
            </div>
        </div>
    </div>
</div>
<!-- End Chart Widget -->
