    "django-debug-permissions>=1.0.0",
    "django-debug-toolbar>=5.2.0",
    "django-debug-toolbar-template-profiler>=2.1.0",
    "django-debugtools>=2.0",
    "django-filter-stubs>=0.1.3",
    "django-model-info>=2024.11.5",
    "django-pdb>=0.6.2",
    "django-request-viewer>=1.0.3",
    "django-silk>=5.4.0",
    "django-stubs>=5.2.1",
    "django-stubs-ext>=5.2.1",
    "djangorestframework-stubs[compatible-mypy]>=1.4.0",
    "djangorestframework-types>=0.9.0",
    "djhtml>=3.0.8",
    "djipsum>=1.1.5",
    "djlint>=1.36.4",
    "docformatter>=1.7.7",
    "docutils>=0.21.2",
    "drf-typed>=0.3.0",
    "factory-boy>=3.3.3",
    "faker>=37.4.0",
    "flake8>=7.3.0",
    "gprof2dot>=2025.4.14",
    "inquirer>=3.4.0",
    "isort>=6.0.1",
    "lxml-stubs>=0.5.1",
    "mypy>=1.16.1",
    "mypy-extensions>=1.1.0",
    "pdbpp>=0.11.6",
    "pep8>=1.7.1",
    "phone-gen>=3.0.20",
    "pip-chill>=1.0.3",
    "pipdeptree>=2.26.1",
    "prettyprinter>=0.18.0",
    "pycodestyle>=2.14.0",
    "pydocstyle>=6.3.0",
    "pydot>=4.0.1",
    "pygraphviz>=1.14",
    "pylama>=8.4.1",
